<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Should We Eat?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>What Should We Eat?</h1>
    <p>Spin the wheel. End the debate.</p>
  </header>

  <main class="main">
    <section class="wheel-section" aria-label="Spin wheel">
      <div class="wheel-container">
        <div class="wheel-pointer" aria-hidden="true"></div>
        <canvas id="wheel-canvas"></canvas>
      </div>
    </section>

    <section class="controls-section" aria-label="Controls">
      <div class="mode-tabs" role="tablist" aria-label="Source mode">
        <button id="tab-clickup" class="mode-tab active" role="tab" aria-selected="true" type="button">ClickUp</button>
        <button id="tab-custom" class="mode-tab" role="tab" aria-selected="false" type="button">Custom</button>
      </div>

      <!-- ClickUp mode -->
      <div id="panel-clickup" class="mode-panel" role="tabpanel">
        <div class="clickup-info">
          <p class="clickup-label">Synced from <a id="clickup-list-link" href="#" target="_blank" rel="noopener" class="clickup-link">our ClickUp list</a> — add places there!</p>
          <button id="sync-btn" class="sync-btn" type="button">Sync from ClickUp</button>
        </div>
        <ul id="item-list-clickup" class="item-list" aria-label="ClickUp food places"></ul>
        <p id="clickup-status" class="clickup-status"></p>
      </div>

      <!-- Custom mode -->
      <div id="panel-custom" class="mode-panel" role="tabpanel" hidden>
        <div id="template-hint" class="template-hint" hidden>
          <button id="copy-clickup-btn" class="template-btn" type="button">Copy all from ClickUp</button>
        </div>
        <div class="add-form">
          <input type="text" id="item-input" placeholder="Add a place..." aria-label="Food place name" maxlength="40">
          <button id="add-btn" type="button">+ Add</button>
        </div>
        <ul id="item-list-custom" class="item-list" aria-label="Custom food places"></ul>
      </div>

      <button id="spin-btn" class="spin-btn" type="button">SPIN!</button>
      <button id="tournament-btn" class="tournament-btn" type="button">Tournament Mode</button>

      <label class="sound-toggle">
        <input type="checkbox" id="sound-toggle" checked>
        <span>Sound effects</span>
      </label>
    </section>
  </main>

  <footer class="footer">
    <div class="saved-panel">
      <h2>Saved Wheels</h2>
      <div id="saved-configs" class="saved-configs"></div>
      <button id="save-btn" class="save-btn" type="button">Save Current...</button>
    </div>
    <div class="history-panel">
      <h2>Spin History</h2>
      <ul id="history-list" class="history-list"></ul>
      <button id="clear-history-btn" class="clear-history-btn" type="button">Clear History</button>
    </div>
  </footer>

  <div id="result-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-content">
      <p class="modal-label">You're eating at...</p>
      <h2 id="modal-title" class="modal-result"></h2>
      <button id="modal-close" class="modal-close" type="button">Let's go!</button>
    </div>
  </div>

  <div aria-live="assertive" class="visually-hidden" id="announcer"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
